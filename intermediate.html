<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HSKK（中级）练习中心</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    :root { --accent: #e94560; --gold: #d4af37; --cream: #faf8f5; }
    body { font-family: 'Noto Serif SC', 'ZCOOL KuaiLe', serif; background-color: var(--cream); background-image: radial-gradient(ellipse at 20% 20%, rgba(212, 175, 55, 0.06) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(233, 69, 96, 0.04) 0%, transparent 50%); }
    .level-btn { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .level-btn:hover { transform: translateY(-6px) scale(1.01); box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.15); }
    .gradient-text { background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .elegant-shadow { box-shadow: 0 8px 40px -8px rgba(0, 0, 0, 0.1); }
    .fade-in { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.6s ease forwards; }
    .fade-in-delay-1 { animation-delay: 0.15s; }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }
</style>
</head>
<body class="bg-gradient-to-br from-blue-50/50 via-white to-indigo-50/30 min-h-screen">
<nav class="bg-white/70 backdrop-blur-xl border-b border-amber-100/50 sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-16 items-center">
<a class="flex items-center gap-2 text-gray-600 hover:text-gray-900 font-medium transition-colors" href="index.html">
<iconify-icon class="text-lg" icon="lucide:chevron-left"></iconify-icon>
<span>返回首页</span>
</a>
<div class="text-lg font-bold text-gray-800 flex items-center gap-2">
<span class="w-2 h-2 bg-blue-400 rounded-full pulse-dot"></span>
HSKK（中级）备考专区
</div>
<div class="w-20"></div>
</div>
</div>
</nav>
<main class="max-w-4xl mx-auto px-4 py-12">
<div class="bg-white rounded-[2.5rem] p-10 elegant-shadow mb-10 overflow-hidden relative border border-amber-100/30 fade-in">
<div class="relative z-10">
<div class="inline-flex items-center gap-2 bg-gradient-to-r from-blue-100 to-indigo-100 text-indigo-700 px-5 py-2 rounded-full text-sm font-semibold mb-6">
<iconify-icon class="text-indigo-500" icon="lucide:sparkles"></iconify-icon>
<span>掌握约900个常用词语</span>
</div>
<h1 class="text-4xl font-bold text-gray-800 mb-4">中级题型入口</h1>
<p class="text-gray-500 mb-10 text-lg leading-relaxed">中级口语更强调"表达"的连贯性，尤其是根据视觉提示组织语言的能力。</p>
<div class="grid gap-5">
<!-- 题型1 -->
<a class="level-btn group flex items-center p-7 bg-gradient-to-br from-emerald-50 to-white rounded-[2rem] border-2 border-transparent hover:border-emerald-300 transition-all" href="practice.html?level=int&type=repeat">
<div class="relative mr-6">
    <div class="absolute inset-0 bg-emerald-200 rounded-2xl blur-md opacity-30"></div>
    <div class="relative w-14 h-14 bg-gradient-to-br from-emerald-400 to-teal-500 rounded-2xl flex items-center justify-center shadow-lg">
    <iconify-icon class="text-white text-2xl" icon="lucide:headphones"></iconify-icon>
    </div>
</div>
<div class="flex-1">
<h3 class="text-xl font-bold text-gray-800 mb-1">第一部分：听后重复</h3>
<p class="text-gray-500 text-sm">共10题，考察更复杂的句式结构模仿。</p>
</div>
<div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm group-hover:scale-110 group-hover:rotate-12 transition-all duration-300">
<iconify-icon class="text-3xl text-emerald-300 group-hover:text-emerald-500 transition-colors" icon="lucide:play-circle"></iconify-icon>
</div>
</a>
<!-- 题型2 -->
<a class="level-btn group flex items-center p-7 bg-gradient-to-br from-orange-50 to-white rounded-[2rem] border-2 border-transparent hover:border-orange-300 transition-all" href="practice.html?level=int&type=picture">
<div class="relative mr-6">
    <div class="absolute inset-0 bg-orange-200 rounded-2xl blur-md opacity-30"></div>
    <div class="relative w-14 h-14 bg-gradient-to-br from-orange-400 to-amber-500 rounded-2xl flex items-center justify-center shadow-lg">
    <iconify-icon class="text-white text-2xl" icon="lucide:image"></iconify-icon>
    </div>
</div>
<div class="flex-1">
<h3 class="text-xl font-bold text-gray-800 mb-1">第二部分：看图说话</h3>
<p class="text-gray-500 text-sm">共2题，每题提供图片，说一段逻辑完整的短文。</p>
</div>
<div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm group-hover:scale-110 group-hover:rotate-12 transition-all duration-300">
<iconify-icon class="text-3xl text-orange-300 group-hover:text-orange-500 transition-colors" icon="lucide:play-circle"></iconify-icon>
</div>
</a>
<!-- 题型3 -->
<a class="level-btn group flex items-center p-7 bg-gradient-to-br from-indigo-50 to-white rounded-[2rem] border-2 border-transparent hover:border-indigo-300 transition-all" href="practice.html?level=int&type=answer">
<div class="relative mr-6">
    <div class="absolute inset-0 bg-indigo-200 rounded-2xl blur-md opacity-30"></div>
    <div class="relative w-14 h-14 bg-gradient-to-br from-indigo-400 to-purple-500 rounded-2xl flex items-center justify-center shadow-lg">
    <iconify-icon class="text-white text-2xl" icon="lucide:message-square-more"></iconify-icon>
    </div>
</div>
<div class="flex-1">
<h3 class="text-xl font-bold text-gray-800 mb-1">第三部分：回答问题</h3>
<p class="text-gray-500 text-sm">共2题，回答带拼音的问题，展示你的个人观点。</p>
</div>
<div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm group-hover:scale-110 group-hover:rotate-12 transition-all duration-300">
<iconify-icon class="text-3xl text-indigo-300 group-hover:text-indigo-500 transition-colors" icon="lucide:play-circle"></iconify-icon>
</div>
</a>
</div>
</div>
</div>
<div class="bg-gradient-to-r from-gray-900 via-indigo-900 to-gray-900 rounded-[2.5rem] p-10 text-white flex flex-col md:flex-row items-center gap-8 border border-white/10 fade-in fade-in-delay-1">
<div class="flex-1">
<h4 class="text-xl font-bold mb-3 flex items-center gap-2">
<span class="text-amber-400">✦</span>
中级备考建议 (2026版)
</h4>
<p class="text-indigo-200 text-sm leading-relaxed mb-5">
    看图说话是拉开差距的关键。建议练习"5W1H"描述法（Who, When, Where, What, Why, How）。
</p>
<div class="flex flex-wrap gap-3">
<span class="bg-white/10 px-4 py-1.5 rounded-full text-xs font-medium">#逻辑连贯性</span>
<span class="bg-white/10 px-4 py-1.5 rounded-full text-xs font-medium">#关联词运用</span>
<span class="bg-white/10 px-4 py-1.5 rounded-full text-xs font-medium">#时间管理</span>
</div>
</div>
<div class="relative">
<div class="absolute inset-0 bg-amber-400/20 rounded-full blur-xl"></div>
<iconify-icon class="relative text-amber-400 text-7xl animate-pulse" icon="lucide:lightbulb"></iconify-icon>
</div>
</div>
</main>
</body>
</html>
