<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HSKK（高级）练习中心</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    :root { --accent: #e94560; --gold: #d4af37; --cream: #faf8f5; }
    body { font-family: 'Noto Serif SC', 'ZCOOL KuaiLe', serif; background-color: var(--cream); background-image: radial-gradient(ellipse at 30% 10%, rgba(212, 175, 55, 0.06) 0%, transparent 50%), radial-gradient(ellipse at 70% 90%, rgba(233, 69, 96, 0.04) 0%, transparent 50%); }
    .level-btn { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .level-btn:hover { transform: translateY(-6px) scale(1.01); box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.15); }
    .gradient-text { background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .elegant-shadow { box-shadow: 0 8px 40px -8px rgba(0, 0, 0, 0.1); }
    .fade-in { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.6s ease forwards; }
    .fade-in-delay-1 { animation-delay: 0.15s; }
    .fade-in-delay-2 { animation-delay: 0.3s; }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }
    @media (max-width: 768px) {
        .nav-title { display: none; }
        .main-card { padding: 1.5rem; border-radius: 1.5rem; }
        .card-title { font-size: 1.75rem; }
        .type-grid { gap: 1rem; }
        .type-btn { padding: 1rem; border-radius: 1.25rem; }
        .stat-grid { grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
        .stat-card { padding: 1rem; }
    }
</style>
</head>
<body class="bg-gradient-to-br from-purple-50/50 via-white to-rose-50/30 min-h-screen">
<nav class="bg-white/70 backdrop-blur-xl border-b border-amber-100/50 sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-4">
<div class="flex justify-between h-14 md:h-16 items-center">
<a class="flex items-center gap-1 md:gap-2 text-sm md:text-base text-gray-600 hover:text-gray-900 font-medium transition-colors" href="index.html">
<iconify-icon class="text-lg md:text-xl" icon="lucide:chevron-left"></iconify-icon>
<span class="hidden sm:inline">返回首页</span>
</a>
<div class="text-sm md:text-lg font-bold text-gray-800 flex items-center gap-2">
<span class="w-2 h-2 bg-purple-400 rounded-full pulse-dot"></span>
<span class="nav-title">HSKK（高级）备考专区</span>
</div>
<div class="w-10 md:w-20"></div>
</div>
</div>
</nav>
<main class="max-w-4xl mx-auto px-4 py-6 md:py-12">
<div class="main-card bg-white rounded-[1.5rem] md:rounded-[2.5rem] p-5 md:p-10 elegant-shadow mb-6 md:mb-10 overflow-hidden relative border border-amber-100/30 fade-in">
<div class="relative z-10">
<div class="inline-flex items-center gap-2 bg-gradient-to-r from-purple-100 to-rose-100 text-purple-700 px-5 py-2 rounded-full text-sm font-semibold mb-6">
<iconify-icon class="text-purple-500" icon="lucide:sparkles"></iconify-icon>
<span>掌握3000个以上常用词</span>
</div>
<h1 class="text-4xl font-bold text-gray-800 mb-4">高级题型入口</h1>
<p class="text-gray-500 mb-10 text-lg leading-relaxed">高级考试要求考生能流利地表达自己的见解，并能听懂并复述较为复杂的内容。</p>
<div class="grid gap-5">
<a class="level-btn group flex items-center p-7 bg-gradient-to-br from-red-50 to-white rounded-[2rem] border-2 border-transparent hover:border-red-300 transition-all" href="practice.html?level=adv&type=retell">
<div class="relative mr-6">
    <div class="absolute inset-0 bg-red-200 rounded-2xl blur-md opacity-30"></div>
    <div class="relative w-14 h-14 bg-gradient-to-br from-red-400 to-rose-500 rounded-2xl flex items-center justify-center shadow-lg">
    <iconify-icon class="text-white text-2xl" icon="lucide:redo-2"></iconify-icon>
    </div>
</div>
<div class="flex-1">
<h3 class="text-xl font-bold text-gray-800 mb-1">第一部分：听后复述</h3>
<p class="text-gray-500 text-sm">共3题，听一段长约2分钟的话后进行详细复述。</p>
</div>
<div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm group-hover:scale-110 group-hover:rotate-12 transition-all duration-300">
<iconify-icon class="text-3xl text-red-300 group-hover:text-red-500 transition-colors" icon="lucide:play-circle"></iconify-icon>
</div>
</a>
<a class="level-btn group flex items-center p-7 bg-gradient-to-br from-amber-50 to-white rounded-[2rem] border-2 border-transparent hover:border-amber-300 transition-all" href="practice.html?level=adv&type=reading">
<div class="relative mr-6">
    <div class="absolute inset-0 bg-amber-200 rounded-2xl blur-md opacity-30"></div>
    <div class="relative w-14 h-14 bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl flex items-center justify-center shadow-lg">
    <iconify-icon class="text-white text-2xl" icon="lucide:book-open"></iconify-icon>
    </div>
</div>
<div class="flex-1">
<h3 class="text-xl font-bold text-gray-800 mb-1">第二部分：朗读</h3>
<p class="text-gray-500 text-sm">共1题，朗读一段文字，考察断句与声调起伏。</p>
</div>
<div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm group-hover:scale-110 group-hover:rotate-12 transition-all duration-300">
<iconify-icon class="text-3xl text-amber-300 group-hover:text-amber-500 transition-colors" icon="lucide:play-circle"></iconify-icon>
</div>
</a>
<a class="level-btn group flex items-center p-7 bg-gradient-to-br from-purple-50 to-white rounded-[2rem] border-2 border-transparent hover:border-purple-300 transition-all" href="practice.html?level=adv&type=answer">
<div class="relative mr-6">
    <div class="absolute inset-0 bg-purple-200 rounded-2xl blur-md opacity-30"></div>
    <div class="relative w-14 h-14 bg-gradient-to-br from-purple-400 to-violet-500 rounded-2xl flex items-center justify-center shadow-lg">
    <iconify-icon class="text-white text-2xl" icon="lucide:mic-2"></iconify-icon>
    </div>
</div>
<div class="flex-1">
<h3 class="text-xl font-bold text-gray-800 mb-1">第三部分：回答问题</h3>
<p class="text-gray-500 text-sm">共2题，就抽象或社会话题表达深度见解。</p>
</div>
<div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm group-hover:scale-110 group-hover:rotate-12 transition-all duration-300">
<iconify-icon class="text-3xl text-purple-300 group-hover:text-purple-500 transition-colors" icon="lucide:play-circle"></iconify-icon>
</div>
</a>
</div>
</div>
<div class="absolute -right-12 -bottom-12 opacity-30">
<iconify-icon class="text-[14rem] text-amber-200" icon="lucide:graduation-cap"></iconify-icon>
</div>
</div>
<div class="grid md:grid-cols-3 gap-5">
<div class="bg-white p-7 rounded-[2rem] elegant-shadow border border-amber-100/30 text-center fade-in">
<div class="text-3xl font-bold gradient-text mb-2">25<span class="text-lg">min</span></div>
<div class="text-xs text-gray-400 uppercase tracking-widest font-medium">考试总时长</div>
</div>
<div class="bg-white p-7 rounded-[2rem] elegant-shadow border border-amber-100/30 text-center fade-in fade-in-delay-1">
<div class="text-3xl font-bold gradient-text mb-2">10<span class="text-lg">min</span></div>
<div class="text-xs text-gray-400 uppercase tracking-widest font-medium">准备时间</div>
</div>
<div class="bg-white p-7 rounded-[2rem] elegant-shadow border border-amber-100/30 text-center fade-in fade-in-delay-2">
<div class="text-3xl font-bold gradient-text mb-2">60<span class="text-lg">/100</span></div>
<div class="text-xs text-gray-400 uppercase tracking-widest font-medium">及格分数线</div>
</div>
</div>
</main>
</body>
</html>
