<!DOCTYPE html>

<style>
    :root { --accent: #e94560; --gold: #d4af37; --cream: #faf8f5; }
    body { font-family: 'Noto Serif SC', serif; background-color: var(--cream); background-image: radial-gradient(ellipse at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 50%), radial-gradient(ellipse at 90% 80%, rgba(233, 69, 96, 0.04) 0%, transparent 50%); }
    .gradient-text { background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .elegant-shadow { box-shadow: 0 8px 40px -8px rgba(0, 0, 0, 0.1); }
    .fade-in { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.6s ease forwards; }
    .fade-in-delay-1 { animation-delay: 0.15s; }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    .history-item { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .history-item:hover { transform: translateX(8px); box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.15); }
    @media (max-width: 768px) {
        .stats-section { grid-template-columns: 1fr; }
        .chart-card { padding: 1.5rem; border-radius: 1.5rem; }
        .chart-card h3 { font-size: 1.125rem; margin-bottom: 1rem; }
        .summary-card { padding: 1.5rem; border-radius: 1.5rem; }
        .history-list { padding: 1.5rem; border-radius: 1.5rem; }
        .history-item { flex-direction: column; gap: 1rem; padding: 1rem; }
        .history-item .date-box { width: 100%; flex-direction: row; justify-content: center; }
    }
</style>
</head>
<body class="bg-gradient-to-br from-amber-50/50 via-white to-rose-50/30 min-h-screen">

</div>

</div>
</main>
<script>
    // ECharts 趋势图初始化
    const chartDom = document.getElementById('trendChart');
    const myChart = echarts.init(chartDom);
    const option = {
        animation: true,
        grid: { top: 10, right: 10, bottom: 20, left: 30 },
        xAxis: {
            type: 'category',
            data: ['03-20', '03-22', '03-24', '03-25', '03-26', '03-27'],
            axisLine: { show: false },
            axisTick: { show: false }
        },
        yAxis: {
            type: 'value',
            splitLine: { lineStyle: { type: 'dashed' } }
        },
        series: [{
            data: [64, 68, 70, 72, 80, 85],
            type: 'line',
            smooth: true,
            symbolSize: 10,
            lineStyle: { width: 4, color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                { offset: 0, color: '#e94560' },
                { offset: 1, color: '#d4af37' }
            ]) },
            itemStyle: { color: '#e94560', borderSize: 2, borderColor: '#fff' },
            areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: 'rgba(233, 69, 96, 0.25)' },
                    { offset: 1, color: 'rgba(233, 69, 96, 0)' }
                ])
            }
        }]
    };
    myChart.setOption(option);
    window.onresize = myChart.resize;
</script>
